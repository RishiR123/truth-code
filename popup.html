<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 248px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      padding: 20px 18px 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .title { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .tagline { font-size: 10px; color: #52525b; margin-top: 2px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 10px;
      padding: 13px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
      user-select: none;
    }

    .toggle-row:hover { border-color: #3f3f46; }

    .status-wrap { display: flex; align-items: center; gap: 8px; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .dot.on  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.off { background: #3f3f46; }

    .status-label { font-size: 12px; font-weight: 500; }
    .status-label.on  { color: #f0fdf4; }
    .status-label.off { color: #71717a; }

    .switch { position: relative; width: 38px; height: 21px; }
    .switch input { opacity: 0; width: 0; height: 0; position: absolute; }

    .slider {
      position: absolute; inset: 0;
      background: #27272a;
      border-radius: 21px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 15px; height: 15px;
      left: 3px; top: 3px;
      background: #52525b;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .slider { background: #15803d; }
    input:checked + .slider::before { transform: translateX(17px); background: #22c55e; }

    .sites {
      margin-top: 14px;
      display: flex;
      gap: 6px;
    }

    .site-chip {
      font-size: 10px;
      color: #52525b;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 20px;
      padding: 3px 9px;
    }

    .footer {
      margin-top: 14px;
      font-size: 9px;
      color: #3f3f46;
      text-align: center;
    }

    .footer a { color: #52525b; text-decoration: none; }
    .footer a:hover { color: #71717a; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="7.5" stroke="#22c55e" stroke-width="1.2"/>
        <path d="M9 4.5v5" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="9" cy="12.5" r=".9" fill="#22c55e"/>
      </svg>
    </div>
    <div>
      <div class="title">Truth Code</div>
      <div class="tagline">Anti-sycophancy prompt injector</div>
    </div>
  </div>

  <label class="toggle-row" id="toggleRow">
    <div class="status-wrap">
      <div class="dot" id="dot"></div>
      <span class="status-label" id="statusLabel">Loading…</span>
    </div>
    <div class="switch">
      <input type="checkbox" id="toggleInput" />
      <span class="slider"></span>
    </div>
  </label>

  <div class="sites">
    <span class="site-chip">ChatGPT</span>
    <span class="site-chip">Gemini</span>
  </div>

  <div class="footer">
    <a href="https://github.com/rishiorionac/truth-code" target="_blank">github.com/rishiorionac/truth-code</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
